<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verset Finder — caută în Biblie (Cornilescu RCCV & ASV)</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Caută instant cuvinte și fraze în Biblie, fără diacritice. Traduceri: Cornilescu corectată (RCCV) și American Standard Version. Filtre pe carte și capitole, trimiteri, versetul zilei, mod întunecat. Gratuit, fără cont."
    />
    <link rel="canonical" href="https://versetfinder.study/" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Verset Finder" />
    <meta property="og:title" content="Verset Finder — caută în Biblie" />
    <meta
      property="og:description"
      content="Caută instant în Biblie, fără diacritice. Cornilescu corectată (RCCV) și American Standard Version. Filtre pe carte/capitole, trimiteri, versetul zilei, mod întunecat."
    />
    <meta property="og:url" content="https://versetfinder.study/" />
    <meta property="og:image" content="https://versetfinder.study/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="ro_RO" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Verset Finder — caută în Biblie" />
    <meta
      name="twitter:description"
      content="Caută instant în Biblie, fără diacritice. Cornilescu corectată (RCCV) și American Standard Version."
    />
    <meta name="twitter:image" content="https://versetfinder.study/og-image.png" />
    <script>
      // Setează tema înainte de prima randare ca să nu pâlpâie (anti-FOUC).
      try {
        var d = localStorage.getItem('biblia:dark');
        var dark = d === null
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : d === 'true';
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
